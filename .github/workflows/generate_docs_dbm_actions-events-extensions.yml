name: Generate Extensions JSON

on:
  workflow_dispatch: # pozwala uruchomić ręcznie w GitHub Actions

jobs:
  generate-extensions-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Fetch extensions from GitHub API
        id: fetch
        run: |
          mkdir -p temp
          echo "Fetching list of extensions..."
          # Pobieranie JSONa z API
          curl -s https://api.github.com/repos/shadoow051/DBM-v14/contents/bot/extensions \
            -o temp/extensions_list.json
          echo "Saved list of extensions to temp/extensions_list.json"

      - name: Generate JSON file
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const apiFile = path.join(process.cwd(), 'temp/extensions_list.json');
          const outputFile = path.join(process.cwd(), 'extensions.json');

          const list = JSON.parse(fs.readFileSync(apiFile, 'utf-8'));
          const result = [];

          for (const item of list) {
            if (item.type !== 'file' || !item.name.endsWith('.js')) continue;

            // Pobranie pliku z API
            const contentData = require('sync-request')('GET', item.url);
            const jsonContent = JSON.parse(contentData.getBody('utf8'));
            const contentBase64 = jsonContent.content;
            const content = Buffer.from(contentBase64, 'base64').toString('utf-8');

            // Szukanie module.exports.name i module.exports.description
            const nameMatch = content.match(/module\.exports\.name\s*=\s*['\"](.+?)['\"]/);
            const descMatch = content.match(/module\.exports\.description\s*=\s*['\"](.+?)['\"]/);

            const name = nameMatch ? nameMatch[1] : item.name.replace('.js', '');
            const description = descMatch ? descMatch[1] : '';

            result.push({ name, description });
          }

          fs.writeFileSync(outputFile, JSON.stringify(result, null, 2));
          console.log('Generated extensions.json successfully!');
          "

      - name: Commit and push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions.json
          git commit -m "Update extensions.json via workflow" || echo "No changes"
          git push
