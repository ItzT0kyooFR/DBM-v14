name: "Generate Mod Docs"
description: "Generates mod documentation."
on:
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js v24
        uses: actions/setup-node@v3
        with:
          node-version: 24.13.0
      - name: Run Mod Docs Generator
        run: node generate_mod_docs.mjs
