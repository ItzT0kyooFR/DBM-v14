name: Build Page
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Clear docs root
        run: |
          find docs -mindepth 1 -maxdepth 1 ! -name "html" -exec rm -rf {} +
      - name: Copy site from docs/html to docs
        run: |
          cp -r docs/html/* docs/
      - name: Commit built pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs
          git commit -m "Build GitHub Pages" || echo "Nothing to commit"
          git push
