name: Update Branch

on:
  push:
    branches: ["main"]
    paths:
      - "bot/**"
      - "dbm/**"

permissions:
  contents: write

jobs:
  update_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get DBM version
        id: get_version
        run: |
          FULL_VERSION=$(jq -r '.version' bot/package.json)
          # Zamiana np. 4.0.0 -> v4.0
          VERSION="v$(echo $FULL_VERSION | awk -F. '{print $1"."$2}')"
          echo "BRANCH_NAME=$VERSION" >> $GITHUB_ENV

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or update branch
        env:
          BRANCH_NAME: ${{ env.BRANCH_NAME }}
        run: |
          # Sprawdź czy branch istnieje
          if git show-ref --verify --quiet refs/heads/$BRANCH_NAME; then
            EXISTS=true
          else
            EXISTS=false
          fi

          # Stwórz branch od main
          git checkout -B "$BRANCH_NAME" main

          # Usuń wszystko oprócz wybranych folderów i plików
          find . -maxdepth 1 -mindepth 1 ! -name '.git' ! -name 'dbm' ! -name 'bot' ! -name 'README.md' ! -name 'LICENSE' -exec rm -rf {} +

          # Skopiuj najnowsze wersje folderów i plików z main (jeżeli coś jest nowe)
          git checkout main -- dbm bot README.md LICENSE || true

          # Dodaj zmiany i commit
          git add dbm bot README.md LICENSE
          git commit -m "Update branch $BRANCH_NAME" || echo "No changes to commit"

          # Wypchnij branch na repozytorium
          git push origin "$BRANCH_NAME" --force
