name: Create Release
on:
  push:
    branches: ["main"]
    paths:
      - "bot/**"

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get versions
        run: |
          BOT_VERSION=$(jq -r '.version' bot/package.json)
          DISCORDJS_VERSION=$(jq -r '.dependencies["discord.js"]' bot/package.json)
          echo "BOT_VERSION=$BOT_VERSION" >> $GITHUB_ENV
          echo "DISCORDJS_VERSION=$DISCORDJS_VERSION" >> $GITHUB_ENV
          echo "DBM_VERSION=$BOT_VERSION" >> $GITHUB_ENV

      - name: Create zip files
        run: |
          zip -r bot.zip bot/ -x "bot/node_modules/*"
          zip -r dbm.zip dbm/ -x "dbm/resources/app/nodejs/node_modules/*"

      - name: Check if release with this version exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_RELEASE=$(gh release list --json name | jq -r ".[] | select(.name==\"$DBM_VERSION\") | .name")
          echo "EXISTING_RELEASE=$EXISTING_RELEASE" >> $GITHUB_ENV

      # 🔁 JEŚLI RELEASE ISTNIEJE → NADPISZ GO
      - name: Update existing release
        if: env.EXISTING_RELEASE != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Updating existing release $DBM_VERSION"

          # usuń stare assety
          gh release view "$DBM_VERSION" --json assets \
            | jq -r '.assets[].name' \
            | xargs -I {} gh release delete-asset "$DBM_VERSION" {} -y

          # ustaw tag latest
          gh release edit "$DBM_VERSION" \
            --tag latest \
            --title "$DBM_VERSION" \
            --notes "Bot version: v${BOT_VERSION}\nDiscordJS version: ${DISCORDJS_VERSION}"

          # dodaj nowe assety
          gh release upload "$DBM_VERSION" bot.zip dbm.zip --clobber

      # 🆕 JEŚLI NIE ISTNIEJE → NOWY RELEASE
      - name: Reassign previous latest
        if: env.EXISTING_RELEASE == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_NAME=$(gh release list --json tagName,name | jq -r '.[] | select(.tagName=="latest") | .name')
          if [ -n "$PREV_NAME" ]; then
            gh release edit latest --tag "$PREV_NAME"
          fi

      - name: Create new release
        if: env.EXISTING_RELEASE == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "$DBM_VERSION" \
            --notes "Bot version: v${BOT_VERSION}\nDiscordJS version: ${DISCORDJS_VERSION}" \
            --target main \
            bot.zip dbm.zip
