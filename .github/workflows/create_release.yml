name: Create Release
on:
  push:
    branches: ["main"]
    paths:
      - "bot/package.json"

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Get bot and DiscordJS versions
      - name: Get versions
        id: get_versions
        run: |
          # Pobieramy wersję bota
          BOT_VERSION=$(jq -r '.version' bot/package.json)

          # Pobieramy wersję discord.js
          DISCORDJS_VERSION=$(jq -r '.dependencies["discord.js"]' bot/package.json)

          # Nie ma dbmVersion, więc używamy wersji bota jako fallback
          DBM_VERSION=$BOT_VERSION

          # Eksport do środowiska GitHub Actions
          echo "BOT_VERSION=$BOT_VERSION" >> $GITHUB_ENV
          echo "DISCORDJS_VERSION=$DISCORDJS_VERSION" >> $GITHUB_ENV
          echo "DBM_VERSION=$DBM_VERSION" >> $GITHUB_ENV

      # 3️⃣ Create zip files (exclude node_modules to keep zips small)
      - name: Create zip files
        run: |
          zip -r bot.zip bot/
          zip -r dbm.zip dbm/ -x "dbm/resources/app/nodejs/node_modules/*"

      # 4️⃣ Remove previous release with same DBM version
      - name: Remove previous release with same DBM version
        run: |
          PREV_RELEASE_TAG=$(gh release list --limit 100 --json tagName,name | jq -r ".[] | select(.name==\"${DBM_VERSION}\") | .tagName")
          if [ -n "$PREV_RELEASE_TAG" ]; then
            echo "Found existing release with DBM version $DBM_VERSION (tag: $PREV_RELEASE_TAG), deleting it..."
            gh release delete "$PREV_RELEASE_TAG" --yes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5️⃣ Create new release with tag latest and zip assets
      - name: Create Release with assets
        run: |
          echo "$GH_TOKEN" | gh auth login --with-token
          RELEASE_NAME="${DBM_VERSION:-$BOT_VERSION}"
          RELEASE_BODY="Bot version: v${BOT_VERSION}\nDiscordJS version: ${DISCORDJS_VERSION}"
          echo "Creating release $RELEASE_NAME with tag 'latest'..."
          gh release create latest \
            --title "$RELEASE_NAME" \
            --notes "$RELEASE_BODY" \
            --target main \
            bot.zip dbm.zip
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
