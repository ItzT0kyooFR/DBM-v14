name: Create Release
on:
  push:
    branches: ["main"]
    paths:
      - "bot/package.json"

permissions:
  contents: write # potrzebne do gh release

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Get bot and DiscordJS versions
      - name: Get versions
        id: get_versions
        run: |
          BOT_VERSION=$(jq -r '.version' bot/package.json)
          DISCORDJS_VERSION=$(jq -r '.dependencies["discord.js"]' bot/package.json)
          DBM_VERSION=$BOT_VERSION
          echo "BOT_VERSION=$BOT_VERSION" >> $GITHUB_ENV
          echo "DISCORDJS_VERSION=$DISCORDJS_VERSION" >> $GITHUB_ENV
          echo "DBM_VERSION=$DBM_VERSION" >> $GITHUB_ENV

      # 3️⃣ Create zip files (exclude node_modules)
      - name: Create zip files
        run: |
          zip -r bot.zip bot/ -x "bot/node_modules/*"
          zip -r dbm.zip dbm/ -x "dbm/resources/app/nodejs/node_modules/*"

      # 4️⃣ Reassign previous 'latest' tag to its release name
      - name: Reassign previous 'latest' tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_LATEST_TAG=$(gh release list --limit 10 --json tagName,name | jq -r '.[] | select(.tagName=="latest") | .tagName')
          PREV_LATEST_NAME=$(gh release list --limit 10 --json tagName,name | jq -r '.[] | select(.tagName=="latest") | .name')
          if [ -n "$PREV_LATEST_TAG" ]; then
            echo "Found previous release with tag 'latest': $PREV_LATEST_NAME"
            # zmieniamy tag release z latest na numer wersji
            gh release edit "$PREV_LATEST_TAG" --tag "$PREV_LATEST_NAME"
            echo "Previous 'latest' tag reassigned to '$PREV_LATEST_NAME'"
          fi

      # 5️⃣ Create new release with tag latest and zip assets
      - name: Create Release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_NAME="${DBM_VERSION:-$BOT_VERSION}"
          RELEASE_BODY="Bot version: v${BOT_VERSION}\nDiscordJS version: ${DISCORDJS_VERSION}"
          echo "Creating release $RELEASE_NAME with tag 'latest'..."
          gh release create latest \
            --title "$RELEASE_NAME" \
            --notes "$RELEASE_BODY" \
            --target main \
            bot.zip dbm.zip
