name: Create Release
on:
  push:
    branches: ["main"]
    paths:
      - "bot/package.json"
jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Get versions
        id: get_versions
        run: |
          BOT_VERSION=$(jq -r .version bot/package.json)
          DISCORDJS_VERSION=$(jq -r '.dependencies["discord.js"]' bot/package.json)
          DBM_VERSION=$(jq -r .dbmVersion bot/package.json // empty)
          echo "BOT_VERSION=$BOT_VERSION" >> $GITHUB_ENV
          echo "DISCORDJS_VERSION=$DISCORDJS_VERSION" >> $GITHUB_ENV
          echo "DBM_VERSION=$DBM_VERSION" >> $GITHUB_ENV
      - name: Create zip files
        run: |
          zip -r bot.zip bot/
          zip -r dbm.zip dbm/
      - name: Remove previous release with same DBM version
        run: |
          PREV_RELEASE_ID=$(gh release list --limit 100 --json id,title | jq -r ".[] | select(.title==\"${DBM_VERSION}\") | .id")
          if [ -n "$PREV_RELEASE_ID" ]; then
            echo "Found existing release with DBM version $DBM_VERSION, deleting it..."
            gh release delete $PREV_RELEASE_ID --yes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release with assets
        run: |
          RELEASE_NAME="${DBM_VERSION:-$BOT_VERSION}"
          RELEASE_BODY="Bot version: v${BOT_VERSION}\nDiscordJS version: ${DISCORDJS_VERSION}"
          gh release create latest \
            --title "$RELEASE_NAME" \
            --notes "$RELEASE_BODY" \
            --target main \
            bot.zip dbm.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
