name: Build Releases

on:
  push:
    paths:
      - "bot/**"
      - "dbm/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Odczytanie wersji bota i discord.js
      - name: Read Versions
        id: versions
        run: |
          FULL_BOT_VERSION=$(node -p "require('./bot/package.json').version")
          BOT_VERSION="v$(echo $FULL_BOT_VERSION | cut -d. -f1,2)"
          RAW_DISCORDJS_VERSION=$(node -p "const p=require('./bot/package.json'); const v=(p.dependencies?.['discord.js'] || p.devDependencies?.['discord.js'] || 'unknown'); console.log(v)")
          DISCORDJS_VERSION="v$(echo $RAW_DISCORDJS_VERSION | sed 's/^[^0-9]*//')"
          echo "bot=$BOT_VERSION" >> $GITHUB_OUTPUT
          echo "discordjs=$DISCORDJS_VERSION" >> $GITHUB_OUTPUT

      # 3️⃣ Tworzenie/aktualizacja branchy wersji (tylko main)
      - name: Create/Update version branch
        if: github.ref_name == 'main'
        run: |
          FULL_BOT_VERSION=$(node -p "require('./bot/package.json').version")
          MAJOR_MINOR=$(echo $FULL_BOT_VERSION | cut -d. -f1,2)
          BRANCH_NAME="v$MAJOR_MINOR"

          echo "Full bot version: $FULL_BOT_VERSION"
          echo "Target branch: $BRANCH_NAME"

          # Ustawienie autora commita dla GitHub Actions
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git ls-remote --exit-code origin $BRANCH_NAME; then
            echo "Branch $BRANCH_NAME exists, updating it..."
            git fetch origin $BRANCH_NAME
            git checkout $BRANCH_NAME
            git merge main --ff-only
            git add bot dbm
            git commit -m "Update bot and dbm for version $FULL_BOT_VERSION" || echo "No changes to commit"
            git push origin $BRANCH_NAME
            git checkout main
          else
            echo "Branch $BRANCH_NAME does not exist, creating it..."
            git checkout -b $BRANCH_NAME
            git add bot dbm
            git commit -m "Create branch for version $FULL_BOT_VERSION"
            git push origin $BRANCH_NAME
            git checkout main
          fi

      # 4️⃣ Tworzenie ZIP-ów i zapisywanie w ./docs/downloads
      - name: Create ZIP files
        run: |
          mkdir -p docs/downloads

          # ZIP-y "latest"
          zip -r docs/downloads/latest_bot.zip bot
          zip -r docs/downloads/latest_dbm.zip dbm

          # ZIP-y z wersją (np. v4.1)
          zip -r docs/downloads/${{ steps.versions.outputs.bot }}_bot.zip bot
          zip -r docs/downloads/${{ steps.versions.outputs.bot }}_dbm.zip dbm

          echo "Created ZIPs:"
          ls -lh docs/downloads/

      # 5️⃣ Tworzenie/aktualizacja releases
      - name: Create/Update GitHub Releases
        run: |
          set -e

          # ---------- RELEASE "latest" ----------
          LATEST_TAG="latest"
          echo "Creating/updating latest release with tag $LATEST_TAG"

          # Usuń stary tag, jeśli istnieje
          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            git tag -d "$LATEST_TAG"
            git push origin --delete "$LATEST_TAG"
          fi

          # Utwórz nowy tag
          git tag "$LATEST_TAG"
          git push origin "$LATEST_TAG"

          # Utwórz release z assetami latest
          gh release delete "$LATEST_TAG" --yes || true
          gh release create "$LATEST_TAG" \
            --title "latest" \
            --notes "- **Bot version:** ${{ steps.versions.outputs.bot }}\n- **DiscordJS version:** ${{ steps.versions.outputs.discordjs }}" \
            docs/downloads/latest_bot.zip docs/downloads/latest_dbm.zip

          # ---------- RELEASE z wersją ----------
          VERSION_TAG="${FULL_BOT_VERSION}"
          VERSION_NAME="${{ steps.versions.outputs.bot }}"
          echo "Creating/updating version release with tag $VERSION_TAG"

          # Usuń stary tag, jeśli istnieje
          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            git tag -d "$VERSION_TAG"
            git push origin --delete "$VERSION_TAG"
          fi

          # Utwórz nowy tag
          git tag "$VERSION_TAG"
          git push origin "$VERSION_TAG"

          # Utwórz release z assetami wersji
          gh release delete "$VERSION_TAG" --yes || true
          gh release create "$VERSION_TAG" \
            --title "$VERSION_NAME" \
            --notes "- **Bot version:** ${{ steps.versions.outputs.bot }}\n- **DiscordJS version:** ${{ steps.versions.outputs.discordjs }}" \
            docs/downloads/${{ steps.versions.outputs.bot }}_bot.zip \
            docs/downloads/${{ steps.versions.outputs.bot }}_dbm.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
