name: Build Releases

on:
  push:
    paths:
      - "bot/**"
      - "dbm/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Ustawienie zmiennych wersji
      - name: Set version variables
        id: vars
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "save_docs=true" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "save_docs=false" >> $GITHUB_OUTPUT

      # 3️⃣ Odczyt wersji Discord.js
      - name: Read Discord.js version
        id: discordjs
        run: |
          if [ -f bot/package.json ]; then
            VERSION=$(node -e "const p=require('./bot/package.json'); const v=(p.dependencies?.['discord.js'] || p.devDependencies?.['discord.js'] || 'unknown'); console.log(v.replace(/^[^0-9]*/, ''))")
          else
            VERSION="unknown"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # 4️⃣ Tworzenie branchy wersji (tylko main)
      - name: Create version branch if not exists
        if: github.ref_name == 'main'
        run: |
          BOT_VERSION=$(node -p "require('./bot/package.json').version")
          BRANCH_NAME="v${BOT_VERSION}"

          # sprawdź czy branch istnieje w remote
          if git ls-remote --exit-code origin $BRANCH_NAME; then
            echo "Branch $BRANCH_NAME already exists"
          else
            echo "Creating branch $BRANCH_NAME"
            git checkout -b $BRANCH_NAME
            git push origin $BRANCH_NAME
            git checkout main

      # 5️⃣ Tworzenie ZIP-ów
      - name: Create ZIP files
        run: |
          zip -r ${{ steps.vars.outputs.version }}_bot.zip bot
          zip -r ${{ steps.vars.outputs.version }}_dbm.zip dbm

      # 6️⃣ Zapis ZIP-ów do docs/downloads (tylko main)
      - name: Save ZIPs to docs/downloads (main only)
        if: steps.vars.outputs.save_docs == 'true'
        run: |
          mkdir -p docs/downloads
          mv ${{ steps.vars.outputs.version }}_bot.zip docs/downloads/latest_bot.zip
          mv ${{ steps.vars.outputs.version }}_dbm.zip docs/downloads/latest_dbm.zip

      # 7️⃣ Commit ZIP-ów do main
      - name: Commit ZIPs to main
        if: steps.vars.outputs.save_docs == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/downloads/latest_bot.zip docs/downloads/latest_dbm.zip

          if git diff --cached --quiet; then
            echo "No ZIP changes"
          else
            git commit -m "Update latest download ZIPs"
            git push

      # 8️⃣ Usuń stary release
      - name: Delete old release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: ${{ steps.vars.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9️⃣ Tworzenie nowego release z ZIP-ami
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: ${{ steps.vars.outputs.version }}
          body: |
            - **Bot version:** ${{ steps.vars.outputs.version }}
            - **DiscordJS version:** ${{ steps.discordjs.outputs.version }}
          files: |
            docs/downloads/latest_bot.zip
            docs/downloads/latest_dbm.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
